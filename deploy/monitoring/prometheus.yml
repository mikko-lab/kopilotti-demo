global:
  scrape_interval: 2s
  evaluation_interval: 2s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: kopilotti-sales-transaction-core
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3001

  - job_name: debezium-connect
    metrics_path: /metrics
    static_configs:
      - targets:
          - debezium-connect:9404
