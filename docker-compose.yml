name: kopilotti-cdc

services:
  postgres-db:
    image: postgres:15.13-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kopilotti_db}
      POSTGRES_USER: ${POSTGRES_USER:-kopilotti_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      DEBEZIUM_DATABASE_USER: ${DEBEZIUM_DATABASE_USER:-debezium_user}
      DEBEZIUM_DATABASE_PASSWORD: ${DEBEZIUM_DATABASE_PASSWORD:?Set DEBEZIUM_DATABASE_PASSWORD in .env}
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_transaction_core.sql:/docker-entrypoint-initdb.d/001-transaction-core.sql:ro
      - ./migrations/002_processed_events.sql:/docker-entrypoint-initdb.d/003-processed-events.sql:ro
      - ./deploy/postgres/002-create-debezium-user.sh:/docker-entrypoint-initdb.d/002-create-debezium-user.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB && test \"$$(psql -U $$POSTGRES_USER -d $$POSTGRES_DB -Atqc 'SHOW wal_level')\" = logical"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: quay.io/debezium/kafka:3.6
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      NODE_ID: 1
      NODE_ROLE: combined
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_PORT:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "${KAFKA_PORT:-29092}:29092"
    volumes:
      - kafkadata:/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  debezium-connect:
    image: kopilotti/debezium-connect-jmx:3.6-jmx-1.0.1
    build:
      context: .
      dockerfile: deploy/debezium/Dockerfile
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: kopilotti-connect
      CONFIG_STORAGE_TOPIC: kopilotti_connect_configs
      OFFSET_STORAGE_TOPIC: kopilotti_connect_offsets
      STATUS_STORAGE_TOPIC: kopilotti_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_CONFIG_PROVIDERS: env
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: org.apache.kafka.common.config.provider.EnvVarConfigProvider
      DEBEZIUM_DATABASE_HOST: postgres-db
      DEBEZIUM_DATABASE_PORT: 5432
      DEBEZIUM_DATABASE_NAME: ${POSTGRES_DB:-kopilotti_db}
      DEBEZIUM_DATABASE_USER: ${DEBEZIUM_DATABASE_USER:-debezium_user}
      DEBEZIUM_DATABASE_PASSWORD: ${DEBEZIUM_DATABASE_PASSWORD:?Set DEBEZIUM_DATABASE_PASSWORD in .env}
    ports:
      - "${DEBEZIUM_CONNECT_PORT:-8083}:8083"
      - "${DEBEZIUM_JMX_EXPORTER_PORT:-9404}:9404"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8083/connectors >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  connector-init:
    image: curlimages/curl:8.12.1
    depends_on:
      debezium-connect:
        condition: service_healthy
    volumes:
      - ./deploy/debezium/debezium-outbox-connector.json:/config/connector.json:ro
    command:
      - /bin/sh
      - -ec
      - |
        status="$$(curl --silent --output /tmp/response --write-out '%{http_code}' --request PUT \
          --header 'Content-Type: application/json' \
          --data-binary @/config/connector.json \
          http://debezium-connect:8083/connectors/kopilotti-outbox-connector/config)"
        if [ "$$status" != "200" ] && [ "$$status" != "201" ]; then
          cat /tmp/response
          exit 1
        fi
        attempts=0
        while [ "$$attempts" -lt 12 ]; do
          connector_status="$$(curl --silent http://debezium-connect:8083/connectors/kopilotti-outbox-connector/status || true)"
          if printf '%s' "$$connector_status" | grep -q '"tasks":\[{"id":0,"state":"RUNNING"'; then
            printf '%s\n' "$$connector_status"
            exit 0
          fi
          if printf '%s' "$$connector_status" | grep -q '"state":"FAILED"'; then
            printf '%s\n' "$$connector_status"
            exit 1
          fi
          attempts=$$((attempts + 1))
          sleep 5
        done
        printf '%s\n' "$$connector_status"
        exit 1
    restart: "no"

  prometheus:
    image: prom/prometheus:v3.12.0
    depends_on:
      debezium-connect:
        condition: service_healthy
    extra_hosts:
      - host.docker.internal:host-gateway
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheusdata:/prometheus
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.4.0
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    restart: unless-stopped

volumes:
  pgdata:
  kafkadata:
  prometheusdata:
  grafanadata:
