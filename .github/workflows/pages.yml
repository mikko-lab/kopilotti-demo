name: Deploy customer demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build customer-safe static artifact
        run: |
          mkdir -p _site/assets/cars _site/js _site/styles
          cp index.html vehicle.html styles.css _site/
          cp styles/vehicle.css _site/styles/
          cp assets/cars/demo-vehicle-placeholder.svg _site/assets/cars/
          cp \
            js/deal-summary.js \
            js/demo-landing.js \
            js/demo-vehicle.js \
            js/digital-salesperson.js \
            js/negotiation-api.js \
            js/purchase-flow-api.js \
            _site/js/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
